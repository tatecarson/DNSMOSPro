name: Build Standalone

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: dnsmospro-macos
          - os: windows-latest
            artifact_name: dnsmospro-windows
          - os: ubuntu-latest
            artifact_name: dnsmospro-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller torch
          python -m pip install -e .

      - name: Build standalone artifact
        run: pyinstaller --clean --noconfirm standalone.spec

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent "dist/DNSMOS Pro.app" "${{ matrix.artifact_name }}.zip"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/DNSMOS Pro" -DestinationPath "${{ matrix.artifact_name }}.zip"

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: zip -r "${{ matrix.artifact_name }}.zip" "dist/DNSMOS Pro"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
